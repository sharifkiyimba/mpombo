{% extends "base.html" %}
{% block title %}Change Password — Mpombo{% endblock %}
{% block content %}
<div style="max-width:480px;margin:0 auto;padding:110px 5% 80px">
  <div style="background:white;border-radius:6px;padding:40px;
    box-shadow:0 4px 24px rgba(44,26,14,.08)">
    <h1 style="font-family:'Yeseva One',serif;font-size:30px;
      color:var(--forest);margin-bottom:6px">
      Change <span style="color:var(--clay)">Password</span>
    </h1>
    <p style="font-size:14px;color:var(--text3);margin-bottom:28px">
      Update your admin password below.
    </p>
    <form method="POST">
      <div class="form-group">
        <label>Current Password</label>
        <input type="password" name="current" required placeholder="••••••••">
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="new_password" required 
          placeholder="••••••••" minlength="6">
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" name="confirm" required placeholder="••••••••">
      </div>
      <button type="submit" style="width:100%;padding:14px;
        background:var(--forest);color:white;border:none;border-radius:3px;
        font-family:'Outfit',sans-serif;font-size:13px;letter-spacing:2px;
        text-transform:uppercase;cursor:pointer">
        Update Password
      </button>
    </form>
  </div>
</div>
{% endblock %}
